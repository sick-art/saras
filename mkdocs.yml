site_name: Saras
site_description: Self-hosted, open-source end-to-end agent building platform
site_url: https://inferminds.github.io/saras-docs
repo_url: https://github.com/inferminds/saras
repo_name: inferminds/saras
edit_uri: https://github.com/inferminds/saras-docs/edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Why Saras: why-saras.md
  - Architecture:
      - Overview: architecture/overview.md
      - Agent Schema: architecture/agent-schema.md
      - Compiler: architecture/compiler.md
      - Executor: architecture/executor.md
      - Multi-Agent: architecture/multi-agent.md
  - Concepts:
      - Context Layers: concepts/context-layers.md
      - Tools: concepts/tools.md
      - Routing: concepts/routing.md
  - Self-Hosting: self-hosting.md
  - SDK: sdk.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sick-art/saras
