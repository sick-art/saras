# Development overrides — hot reload for both frontend and backend
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  frontend:
    build:
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"

  backend:
    volumes:
      - ./backend:/app
      - saras_data:/data
    environment:
      - ENVIRONMENT=development
    command: uvicorn saras.main:app --host 0.0.0.0 --port 8000 --reload
